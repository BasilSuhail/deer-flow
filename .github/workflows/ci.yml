name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Backend Lint
        run: |
          cd backend
          uv sync
          uv run ruff check .

      - name: Frontend Lint & Type Check
        run: |
          cd frontend
          corepack enable && corepack install -g pnpm@10.26.2
          pnpm install --frozen-lockfile
          pnpm run lint
          pnpm run typecheck

  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Services
        run: |
          export PNPM_STORE_PATH=$GITHUB_WORKSPACE/.pnpm-store
          export DEER_FLOW_ROOT=$GITHUB_WORKSPACE
          mkdir -p $PNPM_STORE_PATH
          # Build services to ensure Dockerfile and compose config is valid
          docker compose -f docker/docker-compose-dev.yaml build

  audit:
    name: "Security & Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for secret scan
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Backend Audit
        run: |
          cd backend
          uv sync

      - name: Frontend Audit
        run: |
          cd frontend
          corepack enable && corepack install -g pnpm@10.26.2
          # Only fail on high/critical vulnerabilities
          pnpm audit --audit-level high

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --debug --only-verified
