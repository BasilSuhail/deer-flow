# Deep Research Engine — Docker Development Environment
# Usage: docker-compose -f docker-compose-dev.yaml up --build
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - langgraph: LangGraph agent server (port 2024)
#
# Requires: Ollama running on host (port 11434)
# Access: http://localhost:2026

services:
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "2026:2026"
    volumes:
      - ./nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
      - langgraph
      - ollama
    networks:
      - deer-flow-dev
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: deer-flow-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - deer-flow-dev
    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
    container_name: deer-flow-frontend
    command: sh -c "cd frontend && pnpm run dev"
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
      - ../frontend/next.config.js:/app/frontend/next.config.js:ro
      - ../logs:/app/logs
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
    env_file:
      - ../frontend/.env
    networks:
      - deer-flow-dev
    restart: unless-stopped

  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: deer-flow-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-include='*.yaml .env'"
    volumes:
      - ../backend/:/app/backend/
      - gateway-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../logs:/app/logs
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      - CI=true
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: unless-stopped

  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: deer-flow-langgraph
    command: sh -c "cd backend && uv run langgraph dev --no-browser --allow-blocking --host 0.0.0.0 --port 2024"
    volumes:
      - ../backend/:/app/backend/
      - langgraph-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../logs:/app/logs
      - ~/.cache/uv:/root/.cache/uv
    working_dir: /app
    environment:
      - CI=true
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-dev
    restart: unless-stopped

volumes:
  gateway-venv:
  langgraph-venv:
  ollama-data:

networks:
  deer-flow-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24
